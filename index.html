<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث المتدربين</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00c6ff;
    --accent2: #7b5ea7;
    --text: #e8edf5;
    --muted: #6b7fa3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,198,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,198,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  .header { text-align: center; margin-bottom: 50px; }
  .logo-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 30px rgba(0,198,255,0.3);
    margin: 0 auto 16px;
  }
  h1 {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(90deg, var(--accent), #fff 60%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 0.95rem; margin-top: 8px; }

  .search-wrap { position: relative; margin-bottom: 40px; }
  .search-box {
    width: 100%; padding: 20px 28px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.3rem; font-weight: 700;
    color: var(--text); outline: none;
    transition: all 0.3s;
    text-align: center; letter-spacing: 2px;
  }
  .search-box::placeholder { color: var(--muted); font-weight: 400; letter-spacing: 0; font-size: 1rem; }
  .search-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,198,255,0.1), 0 0 40px rgba(0,198,255,0.1);
    background: var(--surface2);
  }

  .loading { text-align: center; padding: 60px; color: var(--muted); display: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080; padding: 16px 24px; border-radius: 12px;
    text-align: center; margin-bottom: 20px; display: none;
  }
  .not-found { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
  .not-found .icon { font-size: 3rem; margin-bottom: 12px; }

  .results-header {
    display: none;
    align-items: center; gap: 12px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
  }
  .trainee-name-big { font-size: 1.3rem; font-weight: 800; color: var(--text); flex: 1; }
  .badge {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #000; font-size: 0.75rem; font-weight: 800;
    padding: 5px 14px; border-radius: 20px;
  }

  .cards-grid { display: grid; gap: 20px; }

  .course-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    animation: slideUp 0.4s ease both;
    position: relative;
  }
  .course-card::before {
    content: ''; position: absolute;
    top: 0; right: 0; left: 0; height: 3px;
  }
  .course-card:nth-child(1)::before { background: linear-gradient(90deg,#00c6ff,#0072ff); }
  .course-card:nth-child(2)::before { background: linear-gradient(90deg,#7b5ea7,#c471ed); }
  .course-card:nth-child(3)::before { background: linear-gradient(90deg,#11998e,#38ef7d); }
  .course-card:nth-child(4)::before { background: linear-gradient(90deg,#f7971e,#ffd200); }
  .course-card:nth-child(5)::before { background: linear-gradient(90deg,#eb3349,#f45c43); }
  .course-card:nth-child(6)::before { background: linear-gradient(90deg,#00c6ff,#7b5ea7); }
  .course-card:nth-child(7)::before { background: linear-gradient(90deg,#11998e,#0072ff); }
  .course-card:nth-child(8)::before { background: linear-gradient(90deg,#c471ed,#f7971e); }
  .course-card:nth-child(n+9)::before { background: linear-gradient(90deg,#00c6ff,#38ef7d); }

  @keyframes slideUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .course-card:nth-child(1){animation-delay:0.05s}
  .course-card:nth-child(2){animation-delay:0.1s}
  .course-card:nth-child(3){animation-delay:0.15s}
  .course-card:nth-child(4){animation-delay:0.2s}
  .course-card:nth-child(5){animation-delay:0.25s}

  .card-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
  }
  .course-name { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; }
  .course-meta { font-size: 0.75rem; color: var(--muted); margin-top: 4px; font-weight: 500; }
  .ref-badge {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.72rem;
    padding: 4px 10px; border-radius: 8px;
    white-space: nowrap; font-weight: 600;
  }
  .sheet-tag {
    font-size: 0.68rem; background: rgba(0,198,255,0.1);
    color: var(--accent); border: 1px solid rgba(0,198,255,0.2);
    padding: 3px 8px; border-radius: 6px; margin-top: 5px;
    display: inline-block;
  }

  .card-body {
    padding: 18px 22px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; align-items: center;
  }
  .info-item label {
    font-size: 0.7rem; color: var(--muted); font-weight: 700;
    letter-spacing: 0.5px; display: block; margin-bottom: 4px;
  }
  .info-item .value { font-size: 0.95rem; font-weight: 700; color: var(--text); }

  .seat-box {
    grid-column: span 2;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 22px;
    display: flex; align-items: center;
    justify-content: space-between; gap: 16px;
  }
  .seat-label { font-size: 0.8rem; color: var(--muted); font-weight: 700; letter-spacing: 1px; }
  .seat-number {
    font-size: 3.8rem; font-weight: 900;
    background: linear-gradient(90deg, var(--accent), #fff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
    filter: drop-shadow(0 0 20px rgba(0,198,255,0.5));
  }

  .status-bar {
    text-align: center; color: var(--muted);
    font-size: 0.8rem; margin-top: 16px; padding: 10px;
  }
  .dot {
    display: inline-block; width: 6px; height: 6px;
    background: var(--accent); border-radius: 50%;
    margin-left: 6px; animation: pulse 2s infinite; vertical-align: middle;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.4;transform:scale(0.7)}
  }

  @media(max-width:500px){
    h1{font-size:1.5rem}
    .card-body{grid-template-columns:1fr}
    .seat-box{grid-column:span 1}
    .seat-number{font-size:2.8rem}
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-icon">🎓</div>
    <h1>نظام البحث عن مقاعد الاختبار</h1>
    <p class="subtitle">أدخل رقمك التدريبي لعرض بياناتك وأماكن جلوسك في جميع المقررات</p>
  </div>

  <div class="search-wrap">
    <input type="text" class="search-box" id="searchInput"
      placeholder="أدخل الرقم التدريبي..." autocomplete="off" inputmode="numeric"/>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>جاري تحميل البيانات...</p>
  </div>
  <div class="not-found" id="notFound">
    <div class="icon">🔎</div>
    <p>لم يتم العثور على بيانات لهذا الرقم التدريبي</p>
  </div>

  <div class="results-header" id="resultsHeader">
    <div class="trainee-name-big" id="traineeName"></div>
    <div class="badge" id="courseCount"></div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
  <div class="status-bar" id="statusBar"></div>

</div>
<script>
// ─── الإعدادات ────────────────────────────────────────────────
const API_KEY       = 'AIzaSyBT8lumTU0jFTIz1snQe8bQrd-mzW_4Oks';
const SPREADSHEET_ID = '1dW195ii44htVGy01sQafCb0XZC1tYwIq25kJvL0Rs8E';

// أعمدة البيانات (بالترتيب في الشيت، يبدأ من 0)
const COL = {
  specialty:   0,
  refNum:      1,
  courseCode:  2,
  courseName:  3,
  traineeId:   4,
  traineeName: 5,
  location:    6,
  seatNum:     7,
};

// ─── الحالة ───────────────────────────────────────────────────
let allData    = []; // [{sheetName, rows:[...]}]
let dataLoaded = false;

// ─── تحميل كل الشيتات عند الفتح ──────────────────────────────
window.addEventListener('DOMContentLoaded', loadAll);

async function loadAll() {
  showLoading(true);
  hideError();
  try {
    // 1. اجلب أسماء كل الشيتات
    const metaUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?key=${API_KEY}&fields=sheets.properties`;
    const metaRes = await fetch(metaUrl);
    if (!metaRes.ok) throw new Error('meta ' + metaRes.status);
    const meta = await metaRes.json();
    const sheets = meta.sheets.map(s => ({
      id:   s.properties.sheetId,
      name: s.properties.title,
    }));

    // 2. اجلب بيانات كل شيت
    const promises = sheets.map(s => fetchSheet(s.name));
    const results  = await Promise.all(promises);

    allData = sheets.map((s, i) => ({ sheetName: s.name, rows: results[i] }));
    dataLoaded = true;

    const total = allData.reduce((n, d) => n + d.rows.length, 0);
    setStatus(`<span class="dot"></span> تم تحميل ${total} سجل من ${sheets.length} ورقة`);
  } catch(e) {
    showError('⚠️ تعذّر تحميل البيانات: ' + e.message);
  }
  showLoading(false);
}

async function fetchSheet(sheetName) {
  const range  = encodeURIComponent(`${sheetName}!A:H`);
  const url    = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}?key=${API_KEY}`;
  const res    = await fetch(url);
  if (!res.ok) throw new Error(sheetName + ' ' + res.status);
  const data   = await res.json();
  const rows   = data.values || [];
  return rows.slice(1); // تخطي السطر الأول (العناوين)
}

// ─── البحث ───────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
let timer;

searchInput.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(doSearch, 300);
});

function doSearch() {
  const q = searchInput.value.trim();
  hide('notFound');
  document.getElementById('resultsHeader').style.display = 'none';
  document.getElementById('cardsGrid').innerHTML = '';

  if (!q) return;
  if (!dataLoaded) { showError('⏳ البيانات لم تكتمل بعد، انتظر لحظة...'); return; }

  const found = [];
  for (const sheet of allData) {
    for (const row of sheet.rows) {
      const id = (row[COL.traineeId] || '').toString().trim();
      if (id === q) found.push({ ...row, _sheet: sheet.sheetName });
    }
  }

  if (found.length === 0) { show('notFound'); return; }

  document.getElementById('traineeName').textContent = found[0][COL.traineeName] || '';
  document.getElementById('courseCount').textContent  = `${found.length} مقرر`;
  document.getElementById('resultsHeader').style.display = 'flex';

  const grid = document.getElementById('cardsGrid');
  found.forEach(row => grid.appendChild(buildCard(row)));
}

function buildCard(row) {
  const card = document.createElement('div');
  card.className = 'course-card';
  const specialty  = row[COL.specialty]  || '—';
  const refNum     = row[COL.refNum]     || '—';
  const courseCode = row[COL.courseCode] || '—';
  const courseName = row[COL.courseName] || '—';
  const location   = row[COL.location]   || '—';
  const seatNum    = row[COL.seatNum]    || '—';
  const sheet      = row._sheet          || '';

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="course-name">${courseName}</div>
        <div class="course-meta">${courseCode} &nbsp;|&nbsp; ${specialty}</div>
        <span class="sheet-tag">📋 ${sheet}</span>
      </div>
      <div class="ref-badge"># ${refNum}</div>
    </div>
    <div class="card-body">
      <div class="info-item">
        <label>📍 مكان الاختبار</label>
        <div class="value">${location}</div>
      </div>
      <div class="seat-box">
        <div class="seat-label">🪑 رقم الجلوس</div>
        <div class="seat-number">${seatNum}</div>
      </div>
    </div>
  `;
  return card;
}

// ─── مساعدات ─────────────────────────────────────────────────
function show(id)      { document.getElementById(id).style.display = 'block'; }
function hide(id)      { document.getElementById(id).style.display = 'none'; }
function showLoading(v){ document.getElementById('loading').style.display = v ? 'block' : 'none'; }
function setStatus(h)  { document.getElementById('statusBar').innerHTML = h; }
function showError(msg){
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError()   { document.getElementById('errorMsg').style.display = 'none'; }
</script>
</body>
</html>
