<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث المتدربين</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00c6ff;
    --accent2: #7b5ea7;
    --text: #e8edf5;
    --muted: #6b7fa3;
    --card1: linear-gradient(135deg, #1a2a4a 0%, #0f1d35 100%);
    --card2: linear-gradient(135deg, #2a1a4a 0%, #1d0f35 100%);
    --card3: linear-gradient(135deg, #1a4a2a 0%, #0f351d 100%);
    --card4: linear-gradient(135deg, #4a2a1a 0%, #351d0f 100%);
    --card5: linear-gradient(135deg, #4a1a2a 0%, #350f1d 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,198,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,198,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 50px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 30px rgba(0,198,255,0.3);
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent), #fff 60%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 8px;
  }

  /* Search box */
  .search-wrap {
    position: relative;
    margin-bottom: 40px;
  }

  .search-box {
    width: 100%;
    padding: 20px 28px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
    text-align: center;
    letter-spacing: 2px;
  }

  .search-box::placeholder {
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0;
  }

  .search-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0,198,255,0.1), 0 0 40px rgba(0,198,255,0.1);
    background: var(--surface2);
  }

  .search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.3rem;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.3s;
  }

  .search-box:focus ~ .search-icon { color: var(--accent); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    display: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 16px 24px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }

  /* Not found */
  .not-found {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    display: none;
  }

  .not-found .icon { font-size: 3rem; margin-bottom: 12px; }

  /* Results header */
  .results-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    display: none;
  }

  .trainee-name-big {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--text);
  }

  .badge {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #000;
    font-size: 0.75rem;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* Cards grid */
  .cards-grid {
    display: grid;
    gap: 20px;
  }

  .course-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: slideUp 0.4s ease both;
    position: relative;
  }

  .course-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0; left: 0;
    height: 3px;
  }

  .course-card:nth-child(1)::before { background: linear-gradient(90deg, #00c6ff, #0072ff); }
  .course-card:nth-child(2)::before { background: linear-gradient(90deg, #7b5ea7, #c471ed); }
  .course-card:nth-child(3)::before { background: linear-gradient(90deg, #11998e, #38ef7d); }
  .course-card:nth-child(4)::before { background: linear-gradient(90deg, #f7971e, #ffd200); }
  .course-card:nth-child(5)::before { background: linear-gradient(90deg, #eb3349, #f45c43); }
  .course-card:nth-child(6)::before { background: linear-gradient(90deg, #00c6ff, #7b5ea7); }
  .course-card:nth-child(7)::before { background: linear-gradient(90deg, #11998e, #0072ff); }
  .course-card:nth-child(8)::before { background: linear-gradient(90deg, #c471ed, #f7971e); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .course-card:nth-child(1) { animation-delay: 0.05s; }
  .course-card:nth-child(2) { animation-delay: 0.1s; }
  .course-card:nth-child(3) { animation-delay: 0.15s; }
  .course-card:nth-child(4) { animation-delay: 0.2s; }
  .course-card:nth-child(5) { animation-delay: 0.25s; }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .course-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
  }

  .course-code {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
  }

  .ref-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    font-weight: 600;
  }

  .card-body {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: center;
  }

  .info-item label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .info-item .value {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Seat number - big highlight */
  .seat-box {
    grid-column: span 2;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 4px;
  }

  .seat-label {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .seat-number {
    font-size: 3.5rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,198,255,0.5));
  }

  /* Status bar */
  .status-bar {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 10px;
    padding: 10px;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 6px;
    animation: pulse 2s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Responsive */
  @media (max-width: 500px) {
    h1 { font-size: 1.6rem; }
    .card-body { grid-template-columns: 1fr; }
    .seat-box { grid-column: span 1; }
    .seat-number { font-size: 2.8rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🎓</div>
    </div>
    <h1>نظام البحث عن مقاعد الاختبار</h1>
    <p class="subtitle">أدخل رقمك التدريبي لعرض بياناتك وأماكن جلوسك في جميع المقررات</p>
  </div>

  <div class="search-wrap">
    <input
      type="text"
      class="search-box"
      id="searchInput"
      placeholder="أدخل الرقم التدريبي..."
      autocomplete="off"
      inputmode="numeric"
    />
    <span class="search-icon">🔍</span>
  </div>

  <div class="error-msg" id="errorMsg">⚠️ تعذّر تحميل البيانات. تأكد من أن الشيت منشور بشكل صحيح.</div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>جاري تحميل البيانات...</p>
  </div>

  <div class="not-found" id="notFound">
    <div class="icon">🔎</div>
    <p>لم يتم العثور على بيانات لهذا الرقم التدريبي</p>
  </div>

  <div class="results-header" id="resultsHeader">
    <div class="trainee-name-big" id="traineeName"></div>
    <div class="badge" id="courseCount"></div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>

  <div class="status-bar" id="statusBar"></div>

</div>

<script>
// ─── الإعدادات ───────────────────────────────────────────────
// ضع روابط الشيتات هنا (كل شيت مقرر = رابط CSV منفصل)
// إذا عندك شيت واحد فيه كل البيانات، استخدم الرابط الأول فقط
// إذا عندك عدة شيتات (تبويبات)، أضف روابطها هنا

const SHEETS = [
  {
    name: "جميع المقررات",
    url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRWQIyY1ghsnH1XdztZVhtFrAz4lVXT_m2NQ-dTA_rP0B6t_fSg2QiP4861b12DiBqSJJmiGrGx7EF2/pub?output=csv"
  }
  // أضف شيتات إضافية هنا إن وجدت:
  // { name: "مقرر 2", url: "..." },
];

// أسماء الأعمدة (بالترتيب في الشيت)
const COL = {
  specialty:   0,  // التخصص
  refNum:      1,  // الرقم المرجعي
  courseCode:  2,  // رمز المقرر
  courseName:  3,  // المقرر
  traineeId:   4,  // رقم المتدرب
  traineeName: 5,  // اسم المتدرب
  location:    6,  // مكان الاختبار
  seatNum:     7,  // رقم الجلوس
};

// ─── الحالة ───────────────────────────────────────────────────
let allData = [];      // [{sheetName, rows:[...]}]
let dataLoaded = false;
let loadError   = false;

// ─── تحميل البيانات عند فتح الصفحة ──────────────────────────
window.addEventListener('DOMContentLoaded', loadAllSheets);

async function loadAllSheets() {
  showLoading(true);
  try {
    const results = await Promise.all(
      SHEETS.map(s => fetchCSV(s.url).then(rows => ({ name: s.name, rows })))
    );
    allData = results;
    dataLoaded = true;
    const total = allData.reduce((s, d) => s + d.rows.length, 0);
    setStatus(`<span class="dot"></span> تم تحميل ${total} سجل بنجاح`);
  } catch(e) {
    loadError = true;
    show('errorMsg');
    setStatus('');
  }
  showLoading(false);
}

async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('fetch failed');
  const text = await res.text();
  return parseCSV(text).slice(1); // تخطي السطر الأول (العناوين)
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// ─── البحث ───────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
let searchTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 300);
});

function doSearch() {
  const q = searchInput.value.trim();
  hide('notFound'); hide('resultsHeader');
  document.getElementById('cardsGrid').innerHTML = '';

  if (!q) return;
  if (!dataLoaded) return;

  const found = [];

  for (const sheet of allData) {
    for (const row of sheet.rows) {
      const id = (row[COL.traineeId] || '').trim();
      if (id === q) {
        found.push({ ...row, _sheet: sheet.name });
      }
    }
  }

  if (found.length === 0) {
    show('notFound');
    return;
  }

  // عرض اسم المتدرب
  const name = found[0][COL.traineeName] || '';
  document.getElementById('traineeName').textContent = name;
  document.getElementById('courseCount').textContent = `${found.length} مقرر`;
  show('resultsHeader');

  // رسم البطاقات
  const grid = document.getElementById('cardsGrid');
  found.forEach((row, i) => {
    grid.appendChild(buildCard(row, i));
  });
}

function buildCard(row, idx) {
  const card = document.createElement('div');
  card.className = 'course-card';

  const specialty   = row[COL.specialty]   || '—';
  const refNum      = row[COL.refNum]      || '—';
  const courseCode  = row[COL.courseCode]  || '—';
  const courseName  = row[COL.courseName]  || '—';
  const location    = row[COL.location]    || '—';
  const seatNum     = row[COL.seatNum]     || '—';

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="course-name">${courseName}</div>
        <div class="course-code">${courseCode} &nbsp;|&nbsp; ${specialty}</div>
      </div>
      <div class="ref-badge"># ${refNum}</div>
    </div>
    <div class="card-body">
      <div class="info-item">
        <label>مكان الاختبار</label>
        <div class="value">${location}</div>
      </div>
      <div class="seat-box">
        <div class="seat-label">🪑 رقم الجلوس</div>
        <div class="seat-number">${seatNum}</div>
      </div>
    </div>
  `;
  return card;
}

// ─── مساعدات ─────────────────────────────────────────────────
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showLoading(v) { document.getElementById('loading').style.display = v ? 'block' : 'none'; }
function setStatus(html) { document.getElementById('statusBar').innerHTML = html; }
</script>
</body>
</html>
